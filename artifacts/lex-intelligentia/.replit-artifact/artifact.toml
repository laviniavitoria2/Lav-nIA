kind = "web"
previewPath = "/"
title = "Lex Intelligentia"
version = "1.0.0"
id = "artifacts/lex-intelligentia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22635

[services.development]
run = "pnpm --filter @workspace/lex-intelligentia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lex-intelligentia", "run", "build" ]
publicDir = "artifacts/lex-intelligentia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22635"
BASE_PATH = "/"
